<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Day 12 AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; }
    header h1 { font-size: 18px; color: #38bdf8; }
    header p { font-size: 12px; color: #64748b; margin-top: 2px; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
    .msg.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
    .msg.bot .label { font-size: 11px; color: #38bdf8; margin-bottom: 4px; }
    .msg.bot .time { font-size: 11px; color: #64748b; margin-top: 6px; }
    .msg.error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing span { width: 8px; height: 8px; background: #38bdf8; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    #inputbar { background: #1e293b; border-top: 1px solid #334155; padding: 16px 24px; display: flex; gap: 12px; }
    #question { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; resize: none; height: 44px; }
    #question:focus { border-color: #38bdf8; }
    #send { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    #send:hover { background: #1d4ed8; }
    #send:disabled { background: #334155; cursor: not-allowed; }
    .welcome { text-align: center; color: #475569; margin: auto; }
    .welcome h2 { font-size: 16px; margin-bottom: 8px; }
    .welcome p { font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>Production AI Agent</h1>
    <p>https://duck-production-86fd.up.railway.app</p>
  </header>

  <div id="chat">
    <div class="welcome">
      <h2>Gửi câu hỏi để bắt đầu</h2>
      <p>API đang chạy trên Railway · Yêu cầu API key</p>
    </div>
  </div>

  <div id="inputbar">
    <textarea id="question" placeholder="Nhập câu hỏi..." rows="1"></textarea>
    <button id="send" onclick="sendQuestion()">Gửi</button>
  </div>

  <script>
    const API_URL = "https://duck-production-86fd.up.railway.app/ask";
    const API_KEY = "day12-secret-key-duc";

    const chat = document.getElementById("chat");
    const input = document.getElementById("question");
    const btn = document.getElementById("send");

    // Remove welcome message on first interaction
    function clearWelcome() {
      const w = document.querySelector(".welcome");
      if (w) w.remove();
    }

    function addMessage(text, role, timestamp) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      if (role === "bot") {
        div.innerHTML = `<div class="label">AI Agent</div><div>${text}</div><div class="time">${timestamp || ""}</div>`;
      } else if (role === "error") {
        div.textContent = text;
      } else {
        div.textContent = text;
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typing";
      div.innerHTML = "<span></span><span></span><span></span>";
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    async function sendQuestion() {
      const q = input.value.trim();
      if (!q) return;

      clearWelcome();
      addMessage(q, "user");
      input.value = "";
      btn.disabled = true;
      addTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "X-API-Key": API_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ question: q })
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok) {
          addMessage("Lỗi " + res.status + ": " + (data.detail || JSON.stringify(data)), "error");
        } else {
          const t = data.timestamp ? new Date(data.timestamp).toLocaleTimeString("vi-VN") : "";
          addMessage(data.answer, "bot", t);
        }
      } catch (e) {
        removeTyping();
        addMessage("Không kết nối được tới API: " + e.message, "error");
      }

      btn.disabled = false;
      input.focus();
    }

    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    });
  </script>
</body>
</html>
